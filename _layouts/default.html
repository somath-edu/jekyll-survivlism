<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title }} | Archive S</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;1,600&family=Noto+Serif+KR:wght@400;600;700;900&family=KoPub+Batang&family=Pretendard:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg-main: #fdfcf8;
      --bg-card: #ffffff;
      --text-main: #2c2c2c;
      --text-sub: #8c7b75;
      --accent-point: #d88e88;
      --accent-line: #e6ddd8;

      --font-logo: 'Playfair Display', serif;
      --font-title: 'Noto Serif KR', serif;
      --font-body: 'Pretendard', sans-serif;
    }

    body {
      background-color: var(--bg-main);
      color: var(--text-main);
      font-family: var(--font-body);
      margin: 0;
      padding: 0;
      line-height: 1.8;
      font-size: 1.05rem;
    }

    a {
      color: var(--accent-point);
      text-decoration: none;
      transition: color 0.2s ease;
    }
    
    a:hover {
      text-decoration: underline;
      color: #b76c66;
    }

    .site-nav {
      max-width: 800px;
      margin: 40px auto 20px auto;
      text-align: center;
      padding: 0 20px;
    }

    .site-nav a {
      color: var(--text-sub);
      font-family: var(--font-body);
      font-size: 0.95rem;
      letter-spacing: 0.5px;
      text-decoration: none;
    }

    .site-nav a:hover {
      color: var(--accent-point);
    }

    .main-content {
      max-width: 800px;
      margin: 0 auto 60px auto;
      padding: 40px 60px;
      background-color: var(--bg-card);
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(74, 59, 50, 0.05);
      border: 1px solid var(--accent-line);
    }
    
    /* 모바일 대응 */
    @media (max-width: 768px) {
      .main-content {
        padding: 30px 20px;
        margin: 0 15px 40px 15px;
      }
    }

    /* Markdown 본문 스타일링 */
    h1, h2, h3, h4, h5, h6 {
      font-family: var(--font-title);
      color: var(--text-main);
      margin-top: 2em;
      margin-bottom: 0.8em;
      font-weight: 700;
    }

    h1 { font-size: 2.2rem; text-align: center; border-bottom: 1px solid var(--accent-line); padding-bottom: 15px; margin-top: 1em; }
    h2 { font-size: 1.6rem; color: #3a2e28; border-bottom: 1px solid #f0eae5; padding-bottom: 8px; }
    h3 { font-size: 1.3rem; }

    p { margin-bottom: 1.5em; }

    img {
      max-width: 100%;
      height: auto;
      border-radius: 8px;
      display: block;
      margin: 2em auto;
      box-shadow: 0 5px 15px rgba(0,0,0,0.08);
    }

    strong, b { font-weight: 600; color: #222; }

    ul, ol { margin-bottom: 1.5em; padding-left: 1.5em; }
    li { margin-bottom: 0.5em; }

    /* 블록인용 (경고문/안내문 스타일) */
    blockquote {
      margin: 2em 0;
      padding: 20px 25px;
      background-color: #fcf8f5;
      border-left: 4px solid var(--accent-point);
      border-radius: 4px;
      font-style: normal;
      color: #554d48;
    }

    blockquote p:last-child { margin-bottom: 0; }
    blockquote strong { color: var(--accent-point); }

    /* 인라인 코드 및 코드블럭 */
    code {
      background: #f4efea;
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 0.9em;
      color: #d25f56;
      font-family: 'Courier New', Courier, monospace;
    }
    
    pre code {
      background: none;
      color: inherit;
    }
    
    pre {
      background: #faf7f2;
      padding: 15px;
      border-radius: 8px;
      overflow-x: auto;
      border: 1px solid #e8e0d5;
    }

    hr {
      border: 0;
      height: 1px;
      background: #e6ddd8;
      margin: 3em 0;
    }

  </style>
</head>
<body>

  <div class="site-nav">
    <a href="https://somath-edu.github.io/">← Archive S 서점으로 돌아가기</a>
  </div>

  <div class="main-content">
    {{ content }}
  </div>

</body>
</html>
