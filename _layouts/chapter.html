---
layout: default
---

<article class="chapter-container">
  <header style="text-align: center; margin-bottom: 2rem;">
    <h1 style="border: none; padding: 0; margin-bottom: 0.5rem;">{{ page.title }}</h1>
  </header>

  <div class="chapter-body markdown-body">
    {{ content }}
  </div>
  
  <footer style="margin-top: 4rem; text-align: center; border-top: 1px solid #e6ddd8; padding-top: 2rem;">
    <a href="{{ site.baseurl }}/" style="display: inline-block; padding: 10px 20px; background: #f5f0eb; border-radius: 30px; font-weight: 500; font-family: 'Pretendard', sans-serif;">목차로 돌아가기</a>
  </footer>
</article>
