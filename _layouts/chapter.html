---
layout: default
---

<style>
  /* 챕터 본문 스타일 */
  .chapter-title {
    font-family: var(--font-title);
    font-size: 2rem;
    font-weight: 700;
    text-align: center;
    margin-bottom: 0.5rem;
    color: var(--text-main);
    border: none;
    padding-bottom: 0;
  }

  .chapter-subline {
    text-align: center;
    font-size: 0.9rem;
    color: var(--text-sub);
    margin-bottom: 2.5rem;
    font-family: var(--font-body);
  }
  
  .chapter-divider {
    border: none;
    height: 1px;
    background: linear-gradient(to right, transparent, var(--accent-line), transparent);
    margin: 2.5rem 0;
  }
  
  /* 본문 블록 */
  .chapter-body {
    font-family: 'Noto Serif KR', serif;
    font-size: 1.08rem;
    line-height: 2.0;
    color: #333;
    word-break: keep-all;
  }
  
  .chapter-body p { margin-bottom: 1.5em; }
  
  .chapter-body ul, .chapter-body ol {
    padding-left: 1.5em;
    margin-bottom: 1.5em;
  }

  .chapter-body li { margin-bottom: 0.5em; }
  
  .chapter-body strong { font-weight: 700; color: #1a1a1a; }
  .chapter-body em { font-style: italic; color: #555; }
  
  /* 하이라이트 */
  mark {
    background: linear-gradient(transparent 60%, #fde68a 60%);
    padding: 0 2px;
    border-radius: 2px;
    font-weight: 700;
    color: #333;
  }
  
  /* 이미지 */
  .chapter-body img {
    width: 100%;
    max-width: 500px;
    height: auto;
    border-radius: 12px;
    display: block;
    margin: 2em auto;
    box-shadow: 0 8px 25px rgba(0,0,0,0.12);
    object-fit: cover;
  }
  
  /* 챕터 링크 목록 (목차 역할 장 페이지) */
  .chapter-link-list {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  
  .chapter-link-item {
    display: flex;
    align-items: baseline;
    gap: 10px;
    padding: 10px 14px;
    border-radius: 8px;
    text-decoration: none;
    color: #333;
    transition: all 0.2s ease;
    border-left: 3px solid transparent;
  }
  
  .chapter-link-item:hover {
    background: rgba(109, 142, 204, 0.08);
    border-left-color: #6d8ecc;
    transform: translateX(4px);
    text-decoration: none;
    color: #1a1a1a;
  }
  
  .chapter-link-num {
    font-family: var(--font-logo);
    font-style: italic;
    font-size: 0.9rem;
    color: #aaa;
    min-width: 22px;
    flex-shrink: 0;
  }
  
  .chapter-link-text {
    font-weight: 600;
    font-size: 1rem;
    min-width: 100px;
    color: #333;
  }
  
  .chapter-link-desc {
    font-size: 0.9rem;
    color: #888;
    font-weight: 400;
  }
  
  @media (max-width: 640px) {
    .chapter-link-item { flex-wrap: wrap; }
    .chapter-link-desc { width: 100%; padding-left: 32px; }
  }

  /* Callout 박스 */
  .callout {
    margin: 2em 0;
    padding: 20px 24px;
    border-radius: 8px;
    border-left: 4px solid #d88e88;
    background-color: #fdfcf8;
  }
  
  .callout-title {
    font-family: var(--font-body);
    font-weight: 700;
    font-size: 0.9rem;
    letter-spacing: 0.5px;
    margin-bottom: 10px;
    text-transform: uppercase;
  }
  
  .callout-body {
    font-size: 1.05rem;
    line-height: 1.8;
    color: #444;
  }
  
  .callout-quote { background-color: #fdf8f8; border-left-color: #d88e88; }
  .callout-important { background-color: #fdfbf5; border-left-color: #e5b05c; }
  .callout-info { background-color: #f7faf7; border-left-color: #6d8e6d; }
  .callout-tip { background-color: #fdfbf5; border-left-color: #e5b05c; }
  .callout-warning, .callout-danger { background-color: #fdf5f5; border-left-color: #c95c5c; }
  .callout-note { background-color: #f5f8fd; border-left-color: #5c8fc9; }
  .callout-heart { background-color: #fdf8f8; border-left-color: #d88e88; }

  /* 하단 네비게이션 */
  .chapter-nav {
    display: flex;
    justify-content: space-between;
    gap: 20px;
    margin-top: 3rem;
    padding-top: 2rem;
    border-top: 1px solid var(--accent-line);
  }

  .nav-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 10px 20px;
    background: #f5f0eb;
    border-radius: 30px;
    font-family: var(--font-body);
    font-size: 0.9rem;
    font-weight: 500;
    color: var(--text-main);
    text-decoration: none;
    transition: all 0.2s;
  }
  
  .nav-btn:hover {
    background: var(--accent-point);
    color: white;
    text-decoration: none;
  }
  
  .nav-btn.center {
    background: transparent;
    border: 1px solid var(--accent-line);
    color: var(--text-sub);
  }
  
  .nav-btn.center:hover {
    border-color: var(--accent-point);
    color: var(--accent-point);
    background: transparent;
  }
  
  /* 모바일 */
  @media (max-width: 640px) {
    .chapter-title { font-size: 1.6rem; }
    .chapter-body { font-size: 1rem; }
    .chapter-nav { flex-wrap: wrap; }
    .nav-btn { font-size: 0.85rem; padding: 8px 16px; }
  }
</style>

<article>
  <header style="text-align: center; margin-bottom: 2rem;">
    <p class="chapter-subline">생동주의자</p>
    <h1 class="chapter-title">{{ page.title | replace: '"', '' | remove: '.' | strip }}</h1>
  </header>

  <div class="chapter-body">
    {{ content }}
  </div>
  
  <nav class="chapter-nav">
    <a href="{{ site.baseurl }}/" class="nav-btn">
      📚 목차로
    </a>
    <a href="https://somath-edu.github.io/" class="nav-btn center">
      🏛️ Archive S 서점
    </a>
  </nav>
</article>
