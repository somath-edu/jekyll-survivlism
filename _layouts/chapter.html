---
layout: default
---

<style>
  /* 챕터 페이지 프리미엄 스타일 */
  :root {
    --bg-book: #f7f7f2;
    --paper-white: #ffffff;
    --text-primary: #2d2d2d;
    --text-muted: #756d67;
    --accent-red: #d68d8d;
    --accent-blue: #6d8ecc;
    --accent-gold: #c5a368;
    --divider-line: #e8e6e1;
    
    --font-heading: 'Noto Serif KR', serif;
    --font-serif: 'Noto Serif KR', serif;
    --font-display: 'Playfair Display', serif;
    --font-sans: 'Pretendard', sans-serif;
  }

  body {
    background-color: var(--bg-book) !important;
  }

  /* 컨테이너 및 카드 스타일 */
  .chapter-article {
    max-width: 820px;
    margin: 40px auto 80px;
    background-color: var(--paper-white);
    padding: 60px 100px 80px; /* Reduced top padding from 80px */
    border-radius: 4px;
    box-shadow: 0 4px 30px rgba(0,0,0,0.03);
    border: 1px solid rgba(0,0,0,0.02);
    position: relative;
  }

  /* 헤더 섹션 */
  .chapter-header {
    text-align: center;
    margin-bottom: 30px; /* Reduced from 60px */
    position: relative;
  }

  .chapter-series-label {
    font-family: var(--font-display);
    font-size: 0.85rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.2em;
    color: var(--accent-red);
    margin-bottom: 15px; /* Reduced from 20px */
    display: block;
    font-style: italic;
  }

  .chapter-title {
    font-family: var(--font-heading);
    font-size: 2.6rem;
    font-weight: 800;
    color: var(--text-primary);
    line-height: 1.3;
    margin-bottom: 0; /* Removed bottom margin */
    word-break: keep-all;
    border: none;
    padding-bottom: 0;
  }

  .chapter-header::after {
    content: '';
    display: block;
    width: 60px;
    height: 1px;
    background: var(--accent-red);
    margin: 30px auto 0; /* Reduced from 40px */
    opacity: 0.4;
  }

  /* 본문 텍스트 스타일 */
  .chapter-body {
    font-family: var(--font-serif);
    font-size: 1.18rem; /* Slightly larger for comfort */
    line-height: 2.2;   /* Increased for vertical rhythm */
    color: var(--text-primary);
    word-break: keep-all;
    text-align: left;   /* Left align is generally safer for NKR spacing */
    letter-spacing: -0.01em; /* Subtle tightening for premium feel */
  }

  .chapter-body p {
    margin-bottom: 2.2rem;
  }

  .chapter-body strong {
    font-weight: 700;
    color: #000;
  }

  /* 하이라이트 */
  mark {
    background: linear-gradient(transparent 70%, #fff3b8 70%);
    padding: 0 4px;
    border-radius: 2px;
    font-weight: 700;
    color: inherit;
  }

  /* 이미지 */
  .chapter-body img {
    width: 100%;
    margin: 3rem 0; /* Slightly reduced */
    border-radius: 4px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.08);
  }

  .chapter-body hr {
    border: none;
    text-align: center;
    margin: 3.5rem 0; /* Reduced from 5rem */
    overflow: visible;
  }

  .chapter-body hr::after {
    content: '···';
    font-size: 1.8rem;
    letter-spacing: 1.5em;
    color: var(--divider-line);
    padding-left: 1.5em;
  }

  /* 콜아웃(인용문) 스타일 완성 */
  blockquote, .callout {
    margin: 3rem 0; /* Reduced from 3.5rem */
    padding: 35px 45px;
    background-color: #fdfdfd;
    border-radius: 12px;
    border: 1px solid #f0f0f0;
    position: relative;
    box-shadow: 0 5px 15px rgba(0,0,0,0.02);
  }

  /* First element in chapter body should have less top margin if it's a callout or hr */
  .chapter-body > *:first-child {
    margin-top: 0 !important;
  }

  .callout::before {
    content: '';
    position: absolute;
    left: 0;
    top: 0;
    bottom: 0;
    width: 5px;
    background-color: var(--accent-red);
    border-radius: 12px 0 0 12px;
  }

  .callout-title {
    display: block;
    font-family: var(--font-sans);
    font-weight: 600;
    font-size: 0.95rem;
    color: var(--text-primary);
    margin-bottom: 18px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .callout-index {
    background-color: #fcfcfc;
    border-left: 4px solid var(--accent-red);
    padding: 30px 40px;
  }

  .callout-index ul, .callout-index ol {
    margin: 0;
    padding-left: 1.2em;
    list-style-type: none;
  }

  .callout-index li {
    margin-bottom: 12px;
    line-height: 1.6;
    position: relative;
    padding-left: 5px;
  }

  .callout-index li::before {
    content: "•";
    color: var(--accent-red);
    position: absolute;
    left: -1em;
    font-weight: bold;
  }

  .callout-index a {
    font-weight: 600;
    color: var(--accent-red);
    text-decoration: none;
    border-bottom: 1px solid transparent;
    transition: border-color 0.2s;
  }

  .callout-index a:hover {
    border-bottom-color: var(--accent-red);
    text-decoration: none;
  }

  /* 하단 네비게이션 */
  .chapter-footer {
    margin-top: 100px;
    padding-top: 40px;
    border-top: 1px dashed var(--divider-line);
  }

  .chapter-nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 20px;
  }

  .nav-btn {
    font-family: var(--font-sans);
    font-size: 0.9rem;
    font-weight: 600;
    color: var(--text-muted);
    text-decoration: none;
    padding: 12px 24px;
    border-radius: 50px;
    background: var(--bg-book);
    transition: all 0.3s ease;
    border: 1px solid var(--divider-line);
  }

  .nav-btn:hover {
    color: var(--paper-white);
    background: var(--accent-red);
    border-color: var(--accent-red);
    transform: translateY(-2px);
    box-shadow: 0 5px 15px rgba(214, 141, 141, 0.3);
  }

  /* 반응형 모바일 */
  @media (max-width: 768px) {
    .chapter-article {
      margin: 15px 10px;
      padding: 40px 20px;
    }
    .chapter-title { 
      font-size: 1.8rem; 
      line-height: 1.4;
      margin-bottom: 20px;
    }
    .chapter-body { 
      font-size: 1.05rem; 
      line-height: 1.9;
      text-align: left; /* Prevent awful spacing from justified text */
      overflow-wrap: break-word;
    }
    .chapter-body img {
      margin: 2rem 0;
    }
    blockquote, .callout {
      margin: 2.5rem 0;
      padding: 25px 20px 25px 25px; /* Less horizontal padding */
    }
    .callout-index {
      padding: 25px 20px;
    }
    .chapter-nav { flex-direction: column; }
    .nav-btn { width: 100%; text-align: center; }
  }
</style>

<article class="chapter-article">
  <header class="chapter-header">
    <span class="chapter-series-label">생동주의자</span>
    <h1 class="chapter-title">{{ page.title | replace: '"', '' | remove: '.' | strip }}</h1>
  </header>

  <div class="chapter-body">
    {{ content }}
  </div>
  
  <footer class="chapter-footer">
    <nav class="chapter-nav">
      <a href="{{ site.baseurl }}/" class="nav-btn">
        📚 목차로
      </a>
      <a href="https://somath-edu.github.io/" class="nav-btn">
        🏛️ Archive S 서점
      </a>
    </nav>
  </footer>
</article>
