---
layout: default
---

<style>
  /* --- 고전 서적 스타일 (Classic Serif) 홈(목차) 전용 --- */
  .book-toc-wrapper {
    font-family: var(--font-body);
    max-width: 900px;
    margin: 0 auto;
  }

  .main-title {
    font-family: var(--font-logo);
    font-size: 2.8rem;
    font-weight: 700;
    text-align: center;
    margin-bottom: 10px;
    color: var(--text-main);
    letter-spacing: -0.5px;
    border: none;
  }
  
  .sub-title {
    text-align: center;
    font-size: 1.1rem;
    color: var(--text-sub);
    margin-bottom: 80px;
    font-family: var(--font-body);
    font-weight: 300;
  }

  /* 파트 카드 컨테이너 */
  .part-container {
    display: grid;
    grid-template-columns: 1fr;
    gap: 40px;
    margin-top: 40px;
  }

  .part-card {
    background: #fff;
    border: 1px solid var(--accent-line);
    border-radius: 12px;
    padding: 40px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.02);
    transition: transform 0.3s ease;
  }

  .part-card:hover {
    transform: translateY(-5px);
    box-shadow: 0 10px 30px rgba(0,0,0,0.05);
  }

  /* 파트 헤더 */
  .part-header {
    margin-bottom: 30px;
    border-bottom: 2px solid var(--bg-main);
    padding-bottom: 20px;
  }
  
  .part-label {
    display: inline-block;
    font-family: var(--font-logo);
    font-size: 0.75rem;
    letter-spacing: 3px;
    color: var(--accent-point);
    font-weight: 700;
    margin-bottom: 8px;
  }
  
  .part-name {
    font-family: var(--font-title);
    font-size: 1.5rem;
    font-weight: 800;
    color: #222;
    word-break: keep-all;
  }

  /* 챕터 그룹 */
  .chapter-group {
    margin-bottom: 30px;
  }

  .chapter-item.main {
    display: flex;
    align-items: center;
    text-decoration: none;
    color: #333;
    margin-bottom: 12px;
    padding: 8px 0;
  }

  .chapter-num {
    font-family: var(--font-logo);
    font-style: italic;
    font-weight: 700;
    font-size: 1.2rem;
    color: var(--accent-point);
    margin-right: 15px;
    min-width: 45px;
  }

  .chapter-text {
    font-size: 1.15rem;
    font-weight: 700;
    font-family: var(--font-title);
  }

  /* 세부 항목 리스트 (Sub-sections) */
  .sub-list {
    list-style: none;
    padding-left: 60px;
    margin: 0;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 10px 20px;
  }

  .sub-list li {
    position: relative;
    padding-left: 12px;
  }

  .sub-list li::before {
    content: "•";
    position: absolute;
    left: 0;
    color: #ddd;
  }

  .sub-list a {
    font-family: 'Pretendard', sans-serif;
    font-size: 0.9rem;
    color: #666;
    text-decoration: none;
    transition: color 0.2s;
  }

  .sub-list a:hover {
    color: var(--accent-point);
    text-decoration: underline;
  }

  /* Callouts */
  blockquote.callout {
    margin: 40px 0;
    padding: 25px 30px;
    background-color: #fdfcf8;
    border: 1px solid #e6ddd8;
    border-left: 4px solid var(--accent-point);
    border-radius: 8px;
    color: #554d48;
  }
  
  /* 모바일 대응 */
  @media (max-width: 768px) {
    .part-card { padding: 25px; }
    .sub-list { 
      grid-template-columns: 1fr; 
      padding-left: 40px;
    }
    .main-title { font-size: 2.2rem; }
    .chapter-text { font-size: 1rem; }
  }

</style>

<div class="book-toc-wrapper">
  {{ content }}
</div>
