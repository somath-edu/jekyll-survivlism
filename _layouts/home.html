---
layout: default
---

<style>
  /* --- 고전 서적 스타일 (Classic Serif) 홈(목차) 전용 --- */
  .book-toc-wrapper {
    font-family: var(--font-body);
  }

  .main-title {
    font-family: var(--font-logo);
    font-size: 2.2rem;
    font-weight: 700;
    text-align: center;
    margin-bottom: 10px;
    color: var(--text-main);
    letter-spacing: -0.5px;
    border: none;
  }
  
  .sub-title {
    text-align: center;
    font-size: 0.95rem;
    color: var(--text-sub);
    margin-bottom: 60px;
    font-family: var(--font-body);
    font-weight: 300;
  }

  /* 파트 구분선 */
  .part-header {
    margin-top: 60px;
    margin-bottom: 25px;
    text-align: center;
    position: relative;
  }
  
  .part-label {
    display: inline-block;
    font-family: var(--font-logo);
    font-size: 0.85rem;
    letter-spacing: 2px;
    color: var(--accent-point);
    border-bottom: 1px solid var(--accent-point);
    padding-bottom: 3px;
    margin-bottom: 10px;
    font-weight: 600;
  }
  
  .part-name {
    font-family: var(--font-title);
    font-size: 1.25rem;
    font-weight: 700;
    color: #333;
    word-break: keep-all;
  }

  /* 챕터 리스트 아이템 */
  .chapter-item {
    display: flex;
    align-items: flex-end;
    margin-bottom: 14px;
    padding: 5px 0;
    transition: all 0.3s ease;
    text-decoration: none;
    color: #4a4a4a;
    border-bottom: 1px solid transparent;
  }

  .chapter-item:hover {
    transform: translateX(5px);
    color: var(--accent-point);
  }

  .chapter-num {
    font-family: var(--font-logo);
    font-style: italic;
    font-weight: 600;
    font-size: 1.1rem;
    color: #bbb;
    margin-right: 12px;
    min-width: 25px;
    text-align: right;
  }

  .chapter-text {
    font-size: 1.05rem;
    font-weight: 500;
  }

  /* 점선 (Leader dots) */
  .dots {
    flex-grow: 1;
    border-bottom: 1px dotted #ccc;
    margin: 0 10px 6px 10px;
  }

  .page-mark {
    font-family: var(--font-logo);
    font-size: 0.85rem;
    font-style: italic;
    color: #aaa;
  }
  
  /* 데스크톱 - 텍스트 줄바꿈 방지 */
  @media (min-width: 641px) {
    .chapter-text { white-space: nowrap; }
  }
  
  /* 모바일 대응 */
  @media (max-width: 640px) {
    .chapter-text { font-size: 0.95rem; }
    .chapter-item { align-items: baseline; }
    .dots { display: none; }
    .page-mark { display: none; }
  }

  /* 세부 항목 스타일 */
  .sub-item {
    margin-left: 20px;
    opacity: 0.85;
  }
  .sub-item .chapter-text {
    font-size: 0.95rem;
    font-weight: 400;
  }
  .sub-item .chapter-num {
    min-width: 15px;
  }
  @media (max-width: 640px) {
    .sub-item { margin-left: 10px; }
  }

  /* Callouts (옵시디언 호환) */
  blockquote.callout {
    margin: 30px 0;
    padding: 15px 20px;
    background-color: #fdfcf8;
    border: 1px solid #e6ddd8;
    border-left: 4px solid var(--accent-point);
    border-radius: 4px;
    color: #554d48;
    font-style: normal;
  }
  blockquote.callout p { margin-bottom: 0; }
  
  blockquote.callout.quote { border-left-color: #d88e88; background-color: #fdf8f8; }
  blockquote.callout.info { border-left-color: #6d8e6d; background-color: #f7faf7; }
  blockquote.callout.danger { border-left-color: #c95c5c; background-color: #fdf5f5; }
  blockquote.callout.tip { border-left-color: #e5b05c; background-color: #fdfbf5; }
  blockquote.callout.question { border-left-color: #5c8fc9; background-color: #f5f8fd; }
  blockquote.callout.heart { border-left-color: #d88e88; background-color: #fdf8f8; }

</style>

<div class="book-toc-wrapper">
  {{ content }}
</div>
